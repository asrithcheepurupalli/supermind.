<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- supermind: the full stop. A sentence ends; a thought is filed. -->
  <style>
    .paper { fill: #faf6ee; }
    .ink { fill: #17150f; }
    @media (prefers-color-scheme: dark) {
      .paper { fill: #141310; }
      .ink { fill: #f2ecdd; }
    }
  </style>
  <rect class="paper" width="512" height="512" rx="96"/>
  <!-- the tail of a written line, ending mid-page -->
  <rect class="ink" x="88" y="330" width="180" height="26" rx="13"/>
  <!-- the period -->
  <circle cx="366" cy="343" r="78" fill="#f04e23"/>
</svg>
