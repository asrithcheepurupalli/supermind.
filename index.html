<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#faf6ee" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#141310" media="(prefers-color-scheme: dark)" />
    <title>supermind. A second brain that stays on your device</title>
    <meta name="description" content="Capture notes, links, and files. supermind tags and files them automatically and finds them the moment you search, all on your device, with optional encryption at rest.">
    <link rel="canonical" href="https://supermind.ink/" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://supermind.ink/" />
    <meta property="og:site_name" content="supermind" />
    <meta property="og:title" content="supermind. A second brain that stays on your device" />
    <meta property="og:description" content="Capture notes, links, and files. They get tagged, filed, and found again the moment you search, all on your device." />
    <meta property="og:image" content="https://supermind.ink/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="supermind. A second brain that stays on your device" />
    <meta name="twitter:description" content="Capture notes, links, and files. They get tagged, filed, and found again the moment you search, all on your device." />
    <meta name="twitter:image" content="https://supermind.ink/og.png" />
    <meta property="og:locale" content="en_US" />
    <meta name="author" content="Asrith Cheepurupalli" />
    <meta name="apple-mobile-web-app-title" content="supermind" />
    <meta name="robots" content="index, follow" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "supermind",
      "url": "https://supermind.ink/",
      "description": "A second brain that stays on your device. Capture notes, links, and files; they get tagged and filed automatically and found the moment you search.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": { "@type": "Person", "name": "Asrith Cheepurupalli" },
      "image": "https://supermind.ink/og.png"
    }
    </script>
    <style>
      /* Boot splash: shown until React mounts, then removed by main.tsx.
         Styled inline so it renders before any bundle loads. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #faf6ee;
        transition: opacity 0.35s ease;
      }
      @media (prefers-color-scheme: dark) {
        #boot { background: #141310; }
        #boot .boot-word { color: #f2ecdd; }
      }
      #boot.boot-done { opacity: 0; pointer-events: none; }
      #boot .boot-word {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 34px;
        letter-spacing: -0.02em;
        color: #17150f;
      }
      #boot .boot-word::after { content: '.'; color: #f04e23; }
      #boot .boot-rule {
        width: 120px;
        height: 2px;
        background: #f04e23;
        transform-origin: left;
        animation: boot-draw 1.1s cubic-bezier(0.16, 1, 0.3, 1) infinite;
      }
      @keyframes boot-draw {
        0% { transform: scaleX(0); opacity: 1; }
        70% { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(1); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-hidden="true">
      <span class="boot-word">supermind</span>
      <span class="boot-rule"></span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
